<section class="min-h-screen flex items-center justify-center bg-gray-50 py-10 px-4">
  <div class="bg-white w-full max-w-lg p-6 sm:p-8 rounded-xl shadow-lg">
    <h2 class="text-2xl sm:text-3xl font-bold text-[#11732E] text-center mb-6">
      JISAJILI TARI CONFERENCE 2026
    </h2>

    <form (ngSubmit)="submitRegistration()" #registrationForm="ngForm" class="space-y-4">

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Jina Kamili</label>
        <input type="text" name="name" [(ngModel)]="user.name" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#11732E]">
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Barua Pepe</label>
        <input type="email" name="email" [(ngModel)]="user.email" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#11732E]">
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Namba ya Simu</label>
        <input type="text" name="phone" [(ngModel)]="user.phone" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#11732E]">
      </div>

     

      <div class="text-center mt-4">
        <button type="submit" [disabled]="loading"
                class="bg-[#11732E] text-white px-6 py-3 rounded-lg font-bold shadow-lg hover:bg-[#0e5a26] transition">
          {{ loading ? 'Tukisajili...' : 'JISAJILI' }}
        </button>
      </div>

      <!-- <p *ngIf="successMessage" class="text-green-600 mt-4 text-center">{{ successMessage }}</p>
      <p *ngIf="errorMessage" class="text-red-600 mt-4 text-center">{{ errorMessage }}</p> -->
    </form>
  </div>
</section>
